<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hola Max</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1210;
      --fg: #e8ebe6;
      --accent: #7cb87c;
      --muted: #8a9389;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
    }
    body {
      font-family: "Source Serif 4", Georgia, serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(124, 184, 124, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(124, 184, 124, 0.06), transparent);
    }
    main {
      text-align: center;
      max-width: 28rem;
    }
    h1 {
      font-family: Fraunces, "Source Serif 4", Georgia, serif;
      font-size: clamp(2.5rem, 8vw, 3.75rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      margin: 0 0 0.75rem;
      line-height: 1.1;
    }
    h1 span {
      color: var(--accent);
      font-style: italic;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hola, <span>Max</span></h1>
    <p>Sitio en GitHub Pages. Edita <code>index.html</code> para seguir construyendo.</p>
  </main>
</body>
</html>
